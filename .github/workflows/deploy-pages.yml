# GitHub Pages deploy: builds and uploads the Next.js static export from `out/`.
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gallery-site-main/package-lock.json

      - name: Install
        working-directory: gallery-site-main
        run: npm ci

      - name: Build + Export
        working-directory: gallery-site-main
        env:
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run export

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gallery-site-main/out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
