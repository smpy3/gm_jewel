# GitHub Pages deploy: builds and uploads the Next.js static export from `out/`.
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve workdir
        run: |
          # Why: your repo may contain the app at repo root OR inside `gallery-site-main/`.
          # Logic: pick the folder that has `package.json` and use it for install/build/export.
          if [ -f "package.json" ]; then
            echo "WORKDIR=." >> "$GITHUB_ENV"
          elif [ -f "gallery-site-main/package.json" ]; then
            echo "WORKDIR=gallery-site-main" >> "$GITHUB_ENV"
          else
            echo "Could not find package.json in repo root or gallery-site-main/" >&2
            exit 1
          fi

      - name: Install
        run: npm ci
        working-directory: ${{ env.WORKDIR }}

      - name: Build + Export
        env:
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run export
        working-directory: ${{ env.WORKDIR }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WORKDIR }}/out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
